name: Deploy LiveLog Docs to Pages

# NOTE: GitHub Pages はリポジトリ設定で一度「Source: GitHub Actions」を
# 有効化する必要がある。有効化後は手動実行(workflow_dispatch)で公開できる。
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "livelog-pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/livelog-site
      - id: deployment
        uses: actions/deploy-pages@v4
