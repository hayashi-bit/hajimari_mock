name: Deploy LiveLog Docs to Pages

on:
  push:
    branches: ["claude/vibrant-meitner-tbc76w"]
    paths:
      - "docs/livelog-site/**"
      - ".github/workflows/livelog-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "livelog-pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/livelog-site
      - id: deployment
        uses: actions/deploy-pages@v4
