name: Build Mascot Desktop App

on:
  workflow_dispatch:
  push:
    paths:
      - 'mascot-desktop/**'
    branches:
      - main
      - 'claude/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mascot-desktop
        run: npm install

      - name: Build exe
        working-directory: mascot-desktop
        run: npx electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hajimari-mascot-windows
          path: mascot-desktop/dist/*.exe
          retention-days: 30
