<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miiiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #C1694F;
      --navy: #0F3752;
      --border: #e8e0d8;
      --muted: #9a8a7a;
      --text: #1a1a1a;
      --bg: #f8f5f0;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: -0.01em;
      cursor: default;
      user-select: none;
    }

    .status-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: background 0.15s;
    }
    .status-btn:hover { background: #b05a42; }

    /* ===== GREETING ===== */
    .greeting-wrap {
      padding: 24px 20px 20px;
    }

    .greeting-time {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .greeting-main {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--navy);
      line-height: 1.3;
    }

    /* ===== FEATURE GRID ===== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding: 0 20px 10px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 20px 28px;
    }

    .feature-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow 0.15s, transform 0.1s, border-color 0.15s;
      position: relative;
    }

    .feature-card:hover:not(.disabled) {
      box-shadow: 0 4px 16px rgba(193,105,79,0.12);
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .feature-card.disabled {
      opacity: 0.5;
      cursor: default;
    }

    .feature-card.main {
      border-color: var(--primary);
      background: linear-gradient(135deg, #fff8f6, #fff);
    }

    .feature-icon {
      font-size: 28px;
      line-height: 1;
    }

    .feature-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }

    .feature-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .coming-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      background: #f0e8e0;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ===== QUICK STATUS ===== */
    .status-preview {
      margin: 0 20px 28px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-preview-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
    }

    .status-preview-link {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .status-preview-link:hover { text-decoration: underline; }

    .status-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg);
    }

    .status-chip .chip-icon { font-size: 14px; }
    .status-chip .chip-val { color: var(--navy); }
    .status-chip .chip-label { color: var(--muted); font-weight: 400; font-size: 11px; }

    .status-alert {
      background: #fff8f0;
      border: 1px solid #f0d8c0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #7a4a20;
      line-height: 1.6;
      display: none;
    }
    .status-alert.show { display: block; }

    /* ===== NO DATA STATE ===== */
    .no-data {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0 4px;
    }

    /* ===== FOOTER FEEDBACK ===== */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      margin-top: 8px;
    }

    .feedback-toggle-btn {
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .feedback-toggle-btn:hover { background: #f8f5f0; border-color: var(--primary); color: var(--primary); }

    .fb-close-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
    }
    .fb-close-btn:hover { color: var(--navy); }

    .feedback-form-wrap {
      display: none;
      padding: 10px 0 4px;
    }
    .feedback-form-wrap.open { display: block; }

    .fb-type-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }

    .fb-type-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: #6b5a4a;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
    }
    .fb-type-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

    .fb-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      background: var(--bg);
      color: var(--text);
      outline: none;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .fb-textarea:focus { border-color: var(--primary); background: #fff; }

    .fb-submit-btn {
      width: 100%;
      padding: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .fb-submit-btn:hover { background: #b05a42; }
    .fb-submit-btn:disabled { background: #e0d8d0; cursor: not-allowed; }

    .fb-status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <span class="logo" id="logoBtn">miiiro</span>
  <a href="/me" class="status-btn">🌱 わたしの可視化</a>
</header>

<div class="greeting-wrap">
  <div class="greeting-time" id="greetingTime"></div>
  <div class="greeting-main" id="greetingMain">今日、何をしますか？</div>
</div>

<div class="section-label">機能</div>
<div class="feature-grid">
  <a href="/chat" class="feature-card main">
    <div class="feature-icon">✦</div>
    <div class="feature-name">壁打ちチャット</div>
    <div class="feature-desc">AIと話して強みを整理する</div>
  </a>

  <div class="feature-card disabled">
    <div class="coming-badge">SOON</div>
    <div class="feature-icon">📱</div>
    <div class="feature-name">SNS投稿</div>
    <div class="feature-desc">あなたの文体で投稿を作る</div>
  </div>

  <div class="feature-card disabled">
    <div class="coming-badge">SOON</div>
    <div class="feature-icon">✅</div>
    <div class="feature-name">タスク管理</div>
    <div class="feature-desc">会話からTo-Doを生成</div>
  </div>

  <div class="feature-card disabled">
    <div class="coming-badge">SOON</div>
    <div class="feature-icon">📝</div>
    <div class="feature-name">議事録</div>
    <div class="feature-desc">会議のメモを自動まとめ</div>
  </div>

  <div class="feature-card disabled">
    <div class="coming-badge">SOON</div>
    <div class="feature-icon">💌</div>
    <div class="feature-name">メール作成</div>
    <div class="feature-desc">いつもの感じで書く</div>
  </div>
</div>

<div class="section-label">わたしの可視化</div>
<div class="status-preview">
  <div class="status-preview-header">
    <span class="status-preview-title">今週のサマリー</span>
    <a href="/me" class="status-preview-link">詳しく見る →</a>
  </div>
  <div class="status-chips" id="statusChips">
    <div class="no-data">会話を始めるとここに状態が表示されます</div>
  </div>
  <div class="status-alert" id="statusAlert"></div>
</div>

<script>
  const SESSIONS_KEY = 'hajimari_sessions';
  const PROFILE_KEY = 'hajimari_profile';

  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
  }

  // ===== GREETING =====
  function setGreeting() {
    const now = new Date();
    const h = now.getHours();
    const profile = (() => { try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); } catch { return {}; } })();
    const name = profile.name ? `${profile.name}さん、` : '';

    let timeLabel, msg;
    if (h < 6)       { timeLabel = '🌙 深夜です'; msg = `${name}夜遅くまでお疲れさまです。`; }
    else if (h < 10) { timeLabel = '🌅 おはようございます'; msg = `${name}今日も一緒に整理しましょう。`; }
    else if (h < 13) { timeLabel = '☀️ こんにちは'; msg = `${name}今日、何をしますか？`; }
    else if (h < 17) { timeLabel = '🌤 こんにちは'; msg = `${name}今日、何をしますか？`; }
    else if (h < 20) { timeLabel = '🌇 お疲れさまです'; msg = `${name}今日の出来事、話してみますか？`; }
    else             { timeLabel = '🌙 夜ですね'; msg = `${name}一日の振り返りをしてみますか？`; }

    document.getElementById('greetingTime').textContent = timeLabel;
    document.getElementById('greetingMain').textContent = msg;
  }

  // ===== STATUS CHIPS =====
  function getWeekRange() {
    const now = new Date();
    const day = now.getDay();
    const start = new Date(now);
    start.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
    start.setHours(0, 0, 0, 0);
    return start;
  }

  function calcStreak(sessions) {
    const days = new Set(sessions.map(s => new Date(s.createdAt).toDateString()));
    let streak = 0;
    const d = new Date();
    while (true) {
      if (days.has(d.toDateString())) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  function countStrengthTags(sessions) {
    const tags = new Set();
    sessions.forEach(s => {
      const sum = s.messages?.find(m => m.role === 'summary');
      if (!sum) return;
      const matches = sum.content.match(/・(.+)/g) || [];
      matches.forEach(m => tags.add(m.replace(/^・/, '').trim().slice(0, 15)));
    });
    return tags.size;
  }

  function buildStatusChips() {
    const sessions = loadSessions();
    if (sessions.length === 0) return;

    const weekStart = getWeekRange();
    const thisWeek = sessions.filter(s => new Date(s.createdAt) >= weekStart);
    const streak = calcStreak(sessions);
    const strengthCount = countStrengthTags(sessions);

    const chips = [];
    if (streak > 0) chips.push(`<div class="status-chip"><span class="chip-icon">🔥</span><span class="chip-val">${streak}日</span><span class="chip-label">連続</span></div>`);
    chips.push(`<div class="status-chip"><span class="chip-icon">💬</span><span class="chip-val">${thisWeek.length}回</span><span class="chip-label">今週の会話</span></div>`);
    if (strengthCount > 0) chips.push(`<div class="status-chip"><span class="chip-icon">✦</span><span class="chip-val">${strengthCount}個</span><span class="chip-label">強みのヒント</span></div>`);

    const el = document.getElementById('statusChips');
    if (chips.length > 0) el.innerHTML = chips.join('');

    // 深夜アラート
    const lateNight = sessions.filter(s => {
      const d = new Date(s.createdAt);
      return d >= weekStart && d.getHours() >= 22;
    });
    if (lateNight.length >= 2) {
      const alert = document.getElementById('statusAlert');
      alert.textContent = `🌙 深夜の会話が今週${lateNight.length}回あります。たまにはゆっくり休んでくださいね。`;
      alert.classList.add('show');
    }
  }

  setGreeting();
  buildStatusChips();

  // ===== FEEDBACK =====
  const SUPA_URL = 'https://kwmulkworqsswmiqbabd.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3bXVsa3dvcnFzc3dtaXFiYWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQwMzcsImV4cCI6MjA5MjcyMDAzN30.yT9dssLbf6gjIzisahhRy8CJpzjxyQxpXdg_tI63imE';
  let feedbackFormOpen = false;
  let selectedFbType = 'アイデア';

  function toggleFeedbackForm() {
    feedbackFormOpen = !feedbackFormOpen;
    document.getElementById('feedbackFormWrap').classList.toggle('open', feedbackFormOpen);
  }

  function closeFeedbackForm() {
    feedbackFormOpen = false;
    document.getElementById('feedbackFormWrap').classList.remove('open');
  }

  document.addEventListener('click', (e) => {
    if (!feedbackFormOpen) return;
    const footer = document.querySelector('.page-footer');
    if (footer && !footer.contains(e.target)) closeFeedbackForm();
  });

  function selectFbType(el, type) {
    selectedFbType = type;
    document.querySelectorAll('.fb-type-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function submitFeedback() {
    const content = document.getElementById('fbContent').value.trim();
    if (!content) return;
    const btn = document.getElementById('fbSubmitBtn');
    const status = document.getElementById('fbStatus');
    btn.disabled = true;
    status.textContent = '送信中...';
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/feedback`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ type: selectedFbType, content }),
      });
      if (!res.ok) throw new Error();
      status.textContent = '✓ 送信しました！ありがとうございます';
      document.getElementById('fbContent').value = '';
      setTimeout(() => {
        status.textContent = '';
        closeFeedbackForm();
      }, 2000);
    } catch {
      status.textContent = '送信に失敗しました。もう一度お試しください。';
    }
    btn.disabled = false;
  }

  // 5-click dev mode
  let logoClicks = 0, logoTimer;
  document.getElementById('logoBtn').addEventListener('click', () => {
    logoClicks++;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => { logoClicks = 0; }, 1500);
    if (logoClicks >= 5) {
      logoClicks = 0;
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0F3752;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;line-height:1.8;text-align:center;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2)';
      toast.innerHTML = '🛠 開発モード<br><a href="/dashboard" style="color:#f5c4b4;text-decoration:none">ダッシュボード</a>　<a href="/docs" style="color:#f5c4b4;text-decoration:none">設計ドキュメント</a>';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 8000);
    }
  });
</script>

<!-- ===== FOOTER FEEDBACK ===== -->
<div class="page-footer">
  <button class="feedback-toggle-btn" id="feedbackToggleBtn" onclick="toggleFeedbackForm()">
    💬 フィードバックを送る
  </button>
  <div class="feedback-form-wrap" id="feedbackFormWrap">
    <div style="display:flex;align-items:center;margin-bottom:8px;">
      <span style="font-size:11px;color:var(--muted);font-weight:600;">フィードバック</span>
      <button class="fb-close-btn" onclick="closeFeedbackForm()">✕</button>
    </div>
    <div class="fb-type-row">
      <button class="fb-type-btn selected" onclick="selectFbType(this,'アイデア')">アイデア</button>
      <button class="fb-type-btn" onclick="selectFbType(this,'感想')">感想</button>
      <button class="fb-type-btn" onclick="selectFbType(this,'不具合')">不具合</button>
      <button class="fb-type-btn" onclick="selectFbType(this,'要望')">要望</button>
    </div>
    <textarea class="fb-textarea" id="fbContent" rows="3" placeholder="気になったこと、改善してほしいことなど..."></textarea>
    <button class="fb-submit-btn" id="fbSubmitBtn" onclick="submitFeedback()">送信する</button>
    <div class="fb-status" id="fbStatus"></div>
  </div>
</div>

</body>
</html>
