<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miiiro – わたしの可視化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #C1694F;
      --primary-light: #fff0ed;
      --navy: #0F3752;
      --navy-light: #e8f0f6;
      --border: #e8e0d8;
      --muted: #9a8a7a;
      --text: #1a1a1a;
      --bg: #f8f5f0;
      --card: #ffffff;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 48px;
    }

    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      font-size: 20px;
      color: var(--muted);
      text-decoration: none;
      line-height: 1;
      padding: 4px;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--navy);
      cursor: default;
      user-select: none;
    }

    .week-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-left: auto;
    }

    /* ===== SECTION ===== */
    .section {
      margin: 20px 20px 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ===== STATS ROW ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 16px 20px 0;
    }

    .stat-mini {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-mini-val {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--primary);
      line-height: 1;
    }

    .stat-mini-val sup {
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      font-weight: 400;
    }

    .stat-mini-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.3;
    }

    /* ===== COMPARE CARD ===== */
    .compare-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .compare-col {
      flex: 1;
      text-align: center;
    }

    .compare-divider {
      width: 1px;
      height: 48px;
      background: var(--border);
      margin: 0 12px;
    }

    .compare-period {
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 4px;
    }

    .compare-val {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--text);
      line-height: 1;
    }

    .compare-val.up { color: var(--primary); }
    .compare-val.down { color: var(--muted); }

    .compare-unit {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
    }

    .compare-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .compare-badge.positive { background: #e8f7ef; color: #2d8c5a; }
    .compare-badge.neutral  { background: #f0e8e0; color: var(--muted); }
    .compare-badge.negative { background: #fde8e8; color: #c04040; }

    /* ===== STRENGTH CARDS ===== */
    .strength-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .strength-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s;
    }

    .strength-card.core {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .strength-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 28px;
    }

    .strength-num {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--primary);
      line-height: 1;
      opacity: 0.5;
    }

    .strength-card.core .strength-num { opacity: 1; }

    .strength-count-badge {
      font-size: 9px;
      font-family: 'IBM Plex Mono', monospace;
      background: #f0e8e0;
      color: var(--muted);
      padding: 2px 5px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .strength-card.core .strength-count-badge {
      background: #f5c4b4;
      color: var(--primary);
    }

    .strength-body { flex: 1; }

    .strength-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    .strength-card.core .strength-text { font-weight: 600; }

    .strength-meta {
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 4px;
    }

    .core-label {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      color: var(--primary);
      background: #fde8df;
      padding: 2px 7px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
    }

    .no-data-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      padding: 28px 20px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ===== RHYTHM (HEATMAP) ===== */
    .heatmap-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: 30px repeat(7, 1fr);
      gap: 5px;
    }

    .hm-header {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hm-row-label {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hm-cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      background: #f0e8e0;
    }

    .hm-cell[data-level="1"] { background: #f5c4b4; }
    .hm-cell[data-level="2"] { background: #e8937a; }
    .hm-cell[data-level="3"] { background: var(--primary); }
    .hm-cell[data-level="night"] { background: var(--navy); opacity: 0.7; }

    .hm-legend {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
      align-items: center;
      flex-wrap: wrap;
    }

    .hm-legend-item { display: flex; align-items: center; gap: 4px; }
    .hm-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ===== TENDENCY ===== */
    .tendency-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tendency-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .tendency-icon { font-size: 20px; margin-bottom: 6px; }
    .tendency-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .tendency-val { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }

    /* ===== ALERT ===== */
    .alert-card {
      margin: 16px 20px 0;
      background: var(--navy);
      color: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.7;
      display: none;
    }
    .alert-card.show { display: block; }

    /* ===== AI MESSAGE ===== */
    .ai-message {
      margin: 20px 20px 0;
      background: var(--primary-light);
      border: 1px solid #f0d0c4;
      border-radius: 14px;
      padding: 16px 18px;
      display: none;
    }
    .ai-message.show { display: block; }
    .ai-message-header {
      font-size: 11px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .ai-message-body {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
    }
    .ai-message-body strong { color: var(--primary); font-weight: 700; }

    /* ===== INTRO GEN ===== */
    .intro-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .intro-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .style-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .style-tab {
      flex: 1;
      padding: 7px 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .style-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .intro-result {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
      display: none;
      margin-bottom: 10px;
      white-space: pre-wrap;
      min-height: 60px;
    }

    .intro-result.show { display: block; }

    .intro-actions {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }

    .intro-actions.show { display: flex; }

    .btn-copy {
      flex: 1;
      padding: 9px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: all 0.15s;
    }

    .btn-copy:hover { border-color: var(--primary); color: var(--primary); }
    .btn-copy.copied { background: #e8f7ef; border-color: #2d8c5a; color: #2d8c5a; }

    .btn-gen {
      flex: 2;
      padding: 9px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-gen-full {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-gen:hover, .btn-gen-full:hover { background: #a85640; }
    .btn-gen:disabled, .btn-gen-full:disabled { opacity: 0.5; cursor: not-allowed; }

    .pattern-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) { .pattern-grid { grid-template-columns: 1fr; } }

    .pattern-block {
      background: #fff;
      border: 1px solid #e8e0d8;
      border-radius: 12px;
      padding: 16px;
    }

    .pattern-block-title {
      font-size: 12px;
      color: #9a8a7a;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .pattern-tag {
      display: inline-block;
      background: #f5f0eb;
      border: 1px solid #e8e0d8;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #5a4a3a;
      margin: 3px 3px 3px 0;
      line-height: 1.5;
    }

    .pattern-empty {
      font-size: 12px;
      color: #bbb;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <a href="/home" class="back-btn">←</a>
  <span class="page-title" id="logoBtn">わたしの可視化</span>
  <span class="week-label" id="weekLabel"></span>
</header>

<!-- ===== STAT MINI ROW ===== -->
<div class="stats-row">
  <div class="stat-mini">
    <div class="stat-mini-val" id="statSessions">0<sup>回</sup></div>
    <div class="stat-mini-label">今週の<br>会話</div>
  </div>
  <div class="stat-mini">
    <div class="stat-mini-val" id="statStrengths">0<sup>個</sup></div>
    <div class="stat-mini-label">強みの<br>ヒント</div>
  </div>
  <div class="stat-mini">
    <div class="stat-mini-val" id="statStreak">0<sup>日</sup></div>
    <div class="stat-mini-label">連続<br>利用</div>
  </div>
  <div class="stat-mini">
    <div class="stat-mini-val" id="statTotal">0<sup>回</sup></div>
    <div class="stat-mini-label">累計<br>会話</div>
  </div>
</div>

<!-- ===== ALERT ===== -->
<div class="alert-card" id="alertCard"></div>

<!-- ===== 継続記録 先週vs今週 ===== -->
<div class="section">
  <div class="section-title">継続記録</div>
  <div class="compare-card">
    <div class="compare-col">
      <div class="compare-period">先週</div>
      <div class="compare-val" id="cmpLast">0</div>
      <div class="compare-unit">回</div>
    </div>
    <div class="compare-divider"></div>
    <div class="compare-col">
      <div class="compare-period">今週</div>
      <div class="compare-val" id="cmpThis">0</div>
      <div class="compare-unit">回</div>
      <div id="cmpBadge"></div>
    </div>
  </div>
</div>

<!-- ===== 強みの可視化 ===== -->
<div class="section">
  <div class="section-title">見えてきた強みのヒント</div>
  <div id="strengthsWrap">
    <div class="no-data-box">まとめを生成すると<br>強みのヒントが蓄積されます ✦</div>
  </div>
</div>

<!-- ===== 思考の傾向 ===== -->
<div class="section">
  <div class="section-title">思考・行動の傾向</div>
  <div class="tendency-grid" id="tendencyGrid">
    <div class="tendency-card">
      <div class="tendency-icon">🕐</div>
      <div class="tendency-label">よく使う時間帯</div>
      <div class="tendency-val" id="tendTime">—</div>
    </div>
    <div class="tendency-card">
      <div class="tendency-icon">📅</div>
      <div class="tendency-label">よく使う曜日</div>
      <div class="tendency-val" id="tendDay">—</div>
    </div>
    <div class="tendency-card">
      <div class="tendency-icon">✏️</div>
      <div class="tendency-label">1回の会話量</div>
      <div class="tendency-val" id="tendMsg">—</div>
    </div>
    <div class="tendency-card">
      <div class="tendency-icon">📈</div>
      <div class="tendency-label">利用ペース</div>
      <div class="tendency-val" id="tendPace">—</div>
    </div>
  </div>
</div>

<!-- ===== 思考・話し方の癖 ===== -->
<div class="section">
  <div class="section-title">思考・話し方の癖</div>
  <div class="pattern-grid">
    <div class="pattern-block">
      <div class="pattern-block-title">🧠 思考の癖</div>
      <div id="thinkingPatterns"><span class="pattern-empty">会話を重ねると表示されます</span></div>
    </div>
    <div class="pattern-block">
      <div class="pattern-block-title">💬 話し方の癖</div>
      <div id="speechPatterns"><span class="pattern-empty">会話を重ねると表示されます</span></div>
    </div>
  </div>
</div>

<!-- ===== 生活リズム ===== -->
<div class="section">
  <div class="section-title">生活リズム（時間帯 × 曜日）</div>
  <div class="heatmap-wrap">
    <div class="heatmap-grid" id="heatmapGrid"></div>
    <div class="hm-legend">
      <div class="hm-legend-item"><div class="hm-dot" style="background:#f0e8e0"></div>なし</div>
      <div class="hm-legend-item"><div class="hm-dot" style="background:#f5c4b4"></div>少</div>
      <div class="hm-legend-item"><div class="hm-dot" style="background:var(--primary)"></div>多</div>
      <div class="hm-legend-item"><div class="hm-dot" style="background:var(--navy)"></div>深夜</div>
    </div>
  </div>
</div>

<!-- ===== 自己紹介文生成 ===== -->
<div class="section">
  <div class="section-title">自己紹介文のたたき台</div>
  <div class="intro-box">
    <div class="intro-hint">会話と強みのデータをもとに、AIが自然な自己紹介文を生成します。</div>
    <div class="style-tabs">
      <button class="style-tab active" onclick="selectStyle(this,'sns')" data-style="sns">SNS</button>
      <button class="style-tab" onclick="selectStyle(this,'pitch')" data-style="pitch">営業・提案</button>
      <button class="style-tab" onclick="selectStyle(this,'casual')" data-style="casual">交流会</button>
    </div>
    <div class="intro-result" id="introResult"></div>
    <div class="intro-actions" id="introActions">
      <button class="btn-copy" id="btnCopy" onclick="copyIntro()">コピー</button>
      <button class="btn-gen" id="btnReGen" onclick="generateIntro()">再生成</button>
    </div>
    <button class="btn-gen-full" id="btnGenIntro" onclick="generateIntro()">AIで生成する ✦</button>
  </div>
</div>

<!-- ===== miiiro からのメッセージ ===== -->
<div class="ai-message" id="aiMessage">
  <div class="ai-message-header">✦ miiiro より</div>
  <div class="ai-message-body" id="aiMessageBody"></div>
</div>

<script>
  // Auth check
  const _sb = supabase.createClient(
    'https://kwmulkworqsswmiqbabd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3bXVsa3dvcnFzc3dtaXFiYWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQwMzcsImV4cCI6MjA5MjcyMDAzN30.yT9dssLbf6gjIzisahhRy8CJpzjxyQxpXdg_tI63imE'
  );
  _sb.auth.getSession().then(({ data }) => {
    if (!data.session) { window.location.href = '/login'; return; }
    loadPatterns(data.session);
  });

  function extractSectionText(text, sectionName) {
    const lines = text.split('\n');
    const result = [];
    let inSection = false;
    for (const line of lines) {
      if (line.startsWith(`■ ${sectionName}`)) { inSection = true; continue; }
      if (inSection && line.startsWith('■ ')) break;
      if (inSection && line.trim()) result.push(line.replace(/^[・\-]\s*/, '').trim());
    }
    return result;
  }

  async function loadPatterns(session) {
    try {
      const res = await fetch(
        'https://kwmulkworqsswmiqbabd.supabase.co/rest/v1/session_memories?select=summary&order=created_at.desc&limit=20',
        { headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3bXVsa3dvcnFzc3dtaXFiYWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQwMzcsImV4cCI6MjA5MjcyMDAzN30.yT9dssLbf6gjIzisahhRy8CJpzjxyQxpXdg_tI63imE', 'Authorization': `Bearer ${session.access_token}` } }
      );
      if (!res.ok) return;
      const rows = await res.json();

      const thinkingMap = {}, speechMap = {};
      for (const row of rows) {
        extractSectionText(row.summary, '思考の癖').forEach(t => { thinkingMap[t] = (thinkingMap[t] || 0) + 1; });
        extractSectionText(row.summary, '話し方の癖').forEach(t => { speechMap[t] = (speechMap[t] || 0) + 1; });
      }

      const renderTags = (map, el) => {
        const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
        if (sorted.length === 0) return;
        el.innerHTML = sorted.map(([text, count]) =>
          `<span class="pattern-tag">${text}${count > 1 ? ` <small style="opacity:.6">×${count}</small>` : ''}</span>`
        ).join('');
      };

      renderTags(thinkingMap, document.getElementById('thinkingPatterns'));
      renderTags(speechMap, document.getElementById('speechPatterns'));
    } catch {}
  }

  const SESSIONS_KEY = 'hajimari_sessions';
  const PROFILE_KEY = 'hajimari_profile';

  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
  }

  function loadProfile() {
    try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); } catch { return {}; }
  }

  function getWeekStart(offset = 0) {
    const now = new Date();
    const day = now.getDay();
    const start = new Date(now);
    start.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
    start.setHours(0, 0, 0, 0);
    return start;
  }

  function calcStreak(sessions) {
    const days = new Set(sessions.map(s => new Date(s.createdAt).toDateString()));
    let streak = 0;
    const d = new Date();
    while (days.has(d.toDateString())) { streak++; d.setDate(d.getDate() - 1); }
    return streak;
  }

  function extractStrengthTags(sessions) {
    // 重複カウント対応: 同じ強みが複数セッションに出たらcountを増やす
    const countMap = {};   // text -> { count, firstDate, text }
    sessions.forEach(s => {
      const sum = s.messages?.find(m => m.role === 'summary');
      if (!sum) return;
      const lines = sum.content.split('\n');
      let inStrength = false;
      const seenInSession = new Set();
      lines.forEach(line => {
        if (line.includes('強み') || line.includes('視点')) inStrength = true;
        else if (line.startsWith('■')) inStrength = false;
        if (inStrength && line.trim().startsWith('・')) {
          const tag = line.replace(/^・/, '').trim().slice(0, 35);
          if (!tag || seenInSession.has(tag)) return;
          seenInSession.add(tag);
          const date = new Date(s.createdAt);
          if (!countMap[tag]) {
            countMap[tag] = { text: tag, count: 1, firstDate: date };
          } else {
            countMap[tag].count++;
            if (date < countMap[tag].firstDate) countMap[tag].firstDate = date;
          }
        }
      });
    });
    return Object.values(countMap).sort((a, b) => b.count - a.count);
  }

  function buildHeatmap(sessions) {
    const DAYS = ['月', '火', '水', '木', '金', '土', '日'];
    const SLOTS = [
      { label: '朝', min: 6, max: 11 },
      { label: '昼', min: 11, max: 17 },
      { label: '夕', min: 17, max: 21 },
      { label: '深夜', min: 21, max: 30 },
    ];

    const counts = {};
    sessions.forEach(s => {
      const d = new Date(s.createdAt);
      const dow = (d.getDay() + 6) % 7;
      const h = d.getHours();
      SLOTS.forEach((slot, si) => {
        const inSlot = si < 3 ? (h >= slot.min && h < slot.max) : (h >= 21 || h < 5);
        if (inSlot) {
          const key = `${si}-${dow}`;
          counts[key] = (counts[key] || 0) + 1;
        }
      });
    });

    const grid = document.getElementById('heatmapGrid');
    grid.innerHTML = '<div></div>' + DAYS.map(d => `<div class="hm-header">${d}</div>`).join('');

    SLOTS.forEach((slot, si) => {
      grid.innerHTML += `<div class="hm-row-label">${slot.label}</div>`;
      for (let dow = 0; dow < 7; dow++) {
        const key = `${si}-${dow}`;
        const c = counts[key] || 0;
        let level = 0;
        if (si === 3 && c > 0) level = 'night';
        else if (c >= 3) level = 3;
        else if (c === 2) level = 2;
        else if (c === 1) level = 1;
        grid.innerHTML += `<div class="hm-cell" data-level="${level}"></div>`;
      }
    });
  }

  function calcTendencies(sessions) {
    if (sessions.length === 0) return;

    // 時間帯
    const hourBuckets = { '朝(6-11時)': 0, '昼(11-17時)': 0, '夕(17-21時)': 0, '深夜': 0 };
    const dayCounts = [0,0,0,0,0,0,0]; // Mon-Sun
    let totalMsgs = 0;

    sessions.forEach(s => {
      const h = new Date(s.createdAt).getHours();
      if (h >= 6 && h < 11) hourBuckets['朝(6-11時)']++;
      else if (h >= 11 && h < 17) hourBuckets['昼(11-17時)']++;
      else if (h >= 17 && h < 21) hourBuckets['夕(17-21時)']++;
      else hourBuckets['深夜']++;

      const dow = (new Date(s.createdAt).getDay() + 6) % 7;
      dayCounts[dow]++;

      totalMsgs += (s.messages || []).filter(m => m.role === 'user').length;
    });

    const topTime = Object.entries(hourBuckets).sort((a,b) => b[1]-a[1])[0][0];
    const DAYNAMES = ['月','火','水','木','金','土','日'];
    const topDay = DAYNAMES[dayCounts.indexOf(Math.max(...dayCounts))];
    const avgMsgs = Math.round(totalMsgs / sessions.length);

    // ペース
    const dates = sessions.map(s => new Date(s.createdAt)).sort();
    let pace = '計測中';
    if (dates.length >= 2) {
      const span = (dates[dates.length-1] - dates[0]) / (1000*60*60*24);
      const perWeek = Math.round(sessions.length / (span / 7) * 10) / 10;
      pace = `週${perWeek}回ペース`;
    }

    document.getElementById('tendTime').textContent = topTime;
    document.getElementById('tendDay').textContent = `${topDay}曜日が多い`;
    document.getElementById('tendMsg').textContent = avgMsgs > 0 ? `平均${avgMsgs}メッセージ` : '—';
    document.getElementById('tendPace').textContent = pace;
  }

  function buildAIMessage(sessions, streak, strengthCount, lateCount) {
    if (sessions.length === 0) return;
    const parts = [];
    if (streak >= 3) parts.push(`**${streak}日連続**でよく続けてますね。その積み重ねが力になっています。`);
    if (strengthCount >= 3) parts.push(`会話から**${strengthCount}個**の強みのヒントが見えてきました。どれもあなたらしさが滲み出ています。`);
    else if (strengthCount > 0) parts.push(`${strengthCount}個の強みのヒントが見えています。会話を重ねるほど、もっとクリアになってきます。`);
    if (lateCount >= 2) parts.push(`深夜の会話が今週**${lateCount}回**。頑張り屋さんなのはわかるけど、休むことも仕事のうちですよ。`);
    if (parts.length === 0) parts.push('会話を重ねるごとに、あなたのことがもっとよく見えてきます。');

    const msg = document.getElementById('aiMessage');
    document.getElementById('aiMessageBody').innerHTML =
      parts.join('\n').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    msg.classList.add('show');
  }

  let selectedIntroStyle = 'sns';

  function selectStyle(el, style) {
    selectedIntroStyle = style;
    document.querySelectorAll('.style-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  async function generateIntro() {
    const sessions = loadSessions();
    const profile = loadProfile();
    const tags = extractStrengthTags(sessions);
    const btnFull = document.getElementById('btnGenIntro');
    const btnRegen = document.getElementById('btnReGen');
    const result = document.getElementById('introResult');
    const actions = document.getElementById('introActions');

    if (tags.length === 0 && !profile.name) {
      result.textContent = 'まずはプロフィールを入力するか、チャットのまとめを生成してみてください。';
      result.classList.add('show');
      return;
    }

    // ボタン無効化
    [btnFull, btnRegen].forEach(b => { if (b) { b.disabled = true; b.textContent = '生成中…'; } });
    result.textContent = '';
    result.classList.add('show');
    actions.classList.remove('show');

    // プロフィール文字列を組み立て
    const profileParts = [];
    if (profile.name) profileParts.push(`名前：${profile.name}`);
    if (profile.jobType) profileParts.push(`職種：${profile.jobType}`);
    if (profile.workContent) profileParts.push(`仕事内容：${profile.workContent}`);
    if (profile.goals) profileParts.push(`目標：${profile.goals}`);
    if (profile.keywords) profileParts.push(`キーワード：${profile.keywords}`);

    try {
      const res = await fetch('/api/intro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          profile: profileParts.join('\n') || '（未設定）',
          strengths: tags.slice(0, 6),
          style: selectedIntroStyle,
        }),
      });

      if (!res.ok) throw new Error();

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const data = line.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.delta?.text || '';
            if (delta) { fullText += delta; result.textContent = fullText; }
          } catch {}
        }
      }
    } catch {
      result.textContent = '生成に失敗しました。もう一度お試しください。';
    }

    [btnFull, btnRegen].forEach(b => { if (b) { b.disabled = false; b.textContent = b === btnFull ? 'AIで生成する ✦' : '再生成'; } });
    btnFull.style.display = 'none';
    actions.classList.add('show');
  }

  function copyIntro() {
    const text = document.getElementById('introResult').textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btnCopy');
      btn.textContent = 'コピーしました ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function init() {
    const sessions = loadSessions();
    const weekStart = getWeekStart(0);
    const lastWeekStart = getWeekStart(-1);

    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    document.getElementById('weekLabel').textContent =
      `${weekStart.getMonth()+1}/${weekStart.getDate()} – ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

    const thisWeek = sessions.filter(s => new Date(s.createdAt) >= weekStart);
    const lastWeek = sessions.filter(s => {
      const d = new Date(s.createdAt);
      return d >= lastWeekStart && d < weekStart;
    });

    const streak = calcStreak(sessions);
    const tags = extractStrengthTags(sessions);
    const lateCount = sessions.filter(s => {
      const d = new Date(s.createdAt);
      return d >= weekStart && (d.getHours() >= 22 || d.getHours() < 5);
    }).length;

    // Stats
    document.getElementById('statSessions').innerHTML = `${thisWeek.length}<sup>回</sup>`;
    document.getElementById('statStrengths').innerHTML = `${tags.length}<sup>個</sup>`;
    document.getElementById('statStreak').innerHTML = `${streak}<sup>日</sup>`;
    document.getElementById('statTotal').innerHTML = `${sessions.length}<sup>回</sup>`;

    // Compare
    document.getElementById('cmpLast').textContent = lastWeek.length;
    document.getElementById('cmpThis').textContent = thisWeek.length;
    const diff = thisWeek.length - lastWeek.length;
    const badge = document.getElementById('cmpBadge');
    if (diff > 0) {
      badge.innerHTML = `<span class="compare-badge positive">↑ ${diff}回増</span>`;
      document.getElementById('cmpThis').classList.add('up');
    } else if (diff < 0) {
      badge.innerHTML = `<span class="compare-badge negative">↓ ${Math.abs(diff)}回減</span>`;
      document.getElementById('cmpThis').classList.add('down');
    } else if (sessions.length > 0) {
      badge.innerHTML = `<span class="compare-badge neutral">→ 先週と同じ</span>`;
    }

    // Alert
    if (lateCount >= 2) {
      const alert = document.getElementById('alertCard');
      alert.innerHTML = `🌙 深夜（22時以降）の会話が今週 ${lateCount} 回ありました。明日は早めに休みましょう。`;
      alert.classList.add('show');
    }

    // Strengths
    const wrap = document.getElementById('strengthsWrap');
    if (tags.length > 0) {
      const maxCount = tags[0].count;
      wrap.innerHTML = `<div class="strength-list">${
        tags.map((t, i) => {
          const isCore = t.count >= 2 || (maxCount === 1 && i === 0);
          const dateStr = t.firstDate
            ? `${t.firstDate.getMonth()+1}/${t.firstDate.getDate()} 初出`
            : '';
          return `
          <div class="strength-card${isCore ? ' core' : ''}">
            <div class="strength-left">
              <div class="strength-num">${i+1}</div>
              <div class="strength-count-badge">${t.count}回</div>
            </div>
            <div class="strength-body">
              ${isCore ? '<div class="core-label">CORE</div>' : ''}
              <div class="strength-text">${t.text}</div>
              ${dateStr ? `<div class="strength-meta">${dateStr}</div>` : ''}
            </div>
          </div>`;
        }).join('')
      }</div>`;
    }

    // Heatmap
    buildHeatmap(sessions);

    // Tendencies
    calcTendencies(sessions);

    // AI message
    buildAIMessage(sessions, streak, tags.length, lateCount);
  }

  init();

  // 5-click dev mode
  let logoClicks = 0, logoTimer;
  document.getElementById('logoBtn').addEventListener('click', () => {
    logoClicks++;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => { logoClicks = 0; }, 1500);
    if (logoClicks >= 5) {
      logoClicks = 0;
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0F3752;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;line-height:1.8;text-align:center;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2)';
      toast.innerHTML = '🛠 開発モード<br><a href="/dashboard" style="color:#f5c4b4;text-decoration:none">ダッシュボード</a>　<a href="/docs" style="color:#f5c4b4;text-decoration:none">設計ドキュメント</a>';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 8000);
    }
  });
</script>
