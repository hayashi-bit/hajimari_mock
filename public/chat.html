<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miiiro – 壁打ちチャット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #C1694F;
      --navy: #0F3752;
      --border: #e8e0d8;
      --muted: #9a8a7a;
      --bg: #f8f5f0;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--navy);
      text-decoration: none;
    }

    nav { display: flex; gap: 4px; margin-left: auto; }
    nav a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: #f0e8e0; color: var(--navy); }
    nav a.active { background: var(--primary); color: #fff; }

    /* Profile banner */
    #profileBanner {
      display: none;
      padding: 7px 20px;
      background: #f0fdf4;
      border-bottom: 1px solid #bbf7d0;
      font-size: 12px;
      color: #166534;
      flex-shrink: 0;
    }

    /* File banner */
    #fileBanner {
      display: none;
      padding: 7px 20px;
      background: #eff6ff;
      border-bottom: 1px solid #bfdbfe;
      font-size: 12px;
      color: #1e40af;
      flex-shrink: 0;
      align-items: center;
      gap: 8px;
    }

    #fileBanner button {
      margin-left: auto;
      background: none;
      border: none;
      color: #1e40af;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }

    /* Progress bar */
    #progressBar {
      display: none;
      padding: 8px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .progress-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .progress-track {
      height: 4px;
      background: #f0e8e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 82%;
    }

    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--navy);
      color: #f8f5f0;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      font-family: 'DM Serif Display', serif;
    }

    .bubble {
      padding: 11px 16px;
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: #1a1a1a;
    }

    .message.user .bubble {
      background: var(--primary);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }

    /* Summary card */
    .summary-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      align-self: stretch;
    }

    .summary-card h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .summary-card .content {
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    /* Typing dots */
    .typing { display: none; }
    .typing.show { display: flex; }

    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c8b8a8;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Summary prompt */
    #summaryPrompt {
      display: none;
      align-self: center;
      text-align: center;
      padding: 16px;
      flex-shrink: 0;
    }

    #summaryPrompt p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .summary-btn {
      padding: 10px 24px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .summary-btn:hover { background: #0a2a3f; }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      color: var(--muted);
      font-size: 16px;
    }

    .icon-btn:hover { background: #f0e8e0; border-color: var(--primary); color: var(--primary); }
    .icon-btn.active { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }

    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--primary); background: #fff; }
    textarea::placeholder { color: #c8b8a8; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #b05a42; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #e0d8d0; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    #fileInput { display: none; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">miiiro</a>
  <nav>
    <a href="/">ダッシュボード</a>
    <a href="/docs">設計ドキュメント</a>
    <a href="/chat" class="active">壁打ちを試す</a>
    <a href="/profile">プロフィール</a>
  </nav>
</header>

<div id="profileBanner">
  <span id="profileBannerText"></span> · <a href="/profile" style="color:#166534; font-weight:600;">変更する</a>
</div>

<div id="fileBanner">
  <span>📎</span>
  <span id="fileBannerText"></span>
  <button onclick="removeFile()" title="削除">×</button>
</div>

<div id="progressBar">
  <div class="progress-label">
    <span id="phaseLabel">フェーズ1：解決したいことを聞かせてください</span>
    <span id="progressPercent"></span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<div class="chat-area" id="chat">
  <div class="message ai">
    <div class="avatar">m</div>
    <div class="bubble" id="firstMessage">こんにちは。今日はどんなことを話しましょうか？</div>
  </div>

  <div class="message ai typing" id="typing">
    <div class="avatar">m</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<div id="summaryPrompt">
  <p>ある程度話せましたね。ここまでの内容をまとめてみますか？</p>
  <button class="summary-btn" onclick="requestSummary()">ここまでをまとめる</button>
</div>

<div class="input-area">
  <div class="input-actions">
    <button class="icon-btn" id="attachBtn" title="資料を添付" onclick="document.getElementById('fileInput').click()">📎</button>
  </div>
  <textarea id="input" placeholder="話しかけてみてください..." rows="1"></textarea>
  <button class="send-btn" id="send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<input type="file" id="fileInput" accept=".txt,.md,.csv,.pdf">

<script>
  const STORAGE_KEY = 'hajimari_profile';
  const PHASES = [
    { label: 'フェーズ1：解決したいことを聞かせてください', until: 3 },
    { label: 'フェーズ2：今の状況を教えてください', until: 7 },
    { label: 'フェーズ3：理想の姿を探っています', until: 11 },
    { label: '分析の仕上げ段階です', until: 999 },
  ];

  // --- Profile ---
  function loadProfile() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
  }

  function buildProfileText(p) {
    const parts = [];
    if (p.name) parts.push(`名前：${p.name}`);
    if (p.jobType) parts.push(`職種：${p.jobType}`);
    if (p.organization) parts.push(`所属：${p.organization}`);
    if (p.workContent) parts.push(`業務内容：${p.workContent}`);
    if (p.teamStructure) parts.push(`チーム構成：${p.teamStructure}`);
    if (p.challenges) parts.push(`課題・悩み：${p.challenges}`);
    if (p.goals) parts.push(`目標：${p.goals}`);
    if (p.keywords) parts.push(`キーワード：${p.keywords}`);
    return parts.join('\n');
  }

  const profile = loadProfile();
  const profileText = buildProfileText(profile);
  const hasProfile = profileText.trim().length > 0;

  let firstMsg = 'こんにちは。今日はどんなことを話しましょうか？';
  if (hasProfile) {
    const name = profile.name ? `${profile.name}さん、` : '';
    firstMsg = `${name}こんにちは。${profile.jobType ? profile.jobType + 'のお仕事をされているんですね。' : ''}今日はどんなことを話しましょうか？`;
    document.getElementById('profileBanner').style.display = 'block';
    document.getElementById('profileBannerText').textContent =
      `📋 プロフィール読み込み済み（${[profile.jobType, profile.organization].filter(Boolean).join(' / ')}）`;
  }
  document.getElementById('firstMessage').textContent = firstMsg;

  // --- File context ---
  let fileContext = null;
  let fileName = null;

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    fileName = file.name;

    if (file.type === 'application/pdf') {
      fileContext = `[PDFファイル: ${file.name}]\n※ PDFの内容はテキスト形式でのみ読み取れます。内容をコピーしてテキストで貼り付けていただくか、別形式でお試しください。`;
    } else {
      try {
        const text = await file.text();
        fileContext = `[添付ファイル: ${file.name}]\n${text.slice(0, 8000)}`;
      } catch {
        fileContext = `[添付ファイル: ${file.name}]（読み取りエラー）`;
      }
    }

    const banner = document.getElementById('fileBanner');
    banner.style.display = 'flex';
    document.getElementById('fileBannerText').textContent = `📎 ${file.name} を読み込みました`;
    document.getElementById('attachBtn').classList.add('active');
    e.target.value = '';
  });

  function removeFile() {
    fileContext = null;
    fileName = null;
    document.getElementById('fileBanner').style.display = 'none';
    document.getElementById('attachBtn').classList.remove('active');
  }

  // --- Chat state ---
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const typing = document.getElementById('typing');

  const history = [
    { role: 'assistant', content: firstMsg }
  ];

  let userTurnCount = 0;
  let summarized = false;

  // --- Progress ---
  function updateProgress() {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('phaseLabel');
    const pct = document.getElementById('progressPercent');

    if (userTurnCount === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';

    const phase = PHASES.find(p => userTurnCount <= p.until) || PHASES[PHASES.length - 1];
    label.textContent = phase.label;

    const progress = Math.min(Math.round((userTurnCount / 11) * 100), 95);
    fill.style.width = progress + '%';
    pct.textContent = progress + '%';

    if (userTurnCount >= 8 && !summarized) {
      document.getElementById('summaryPrompt').style.display = 'block';
    }
  }

  // --- Helpers ---
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, content = '') {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    if (role === 'ai') {
      wrap.innerHTML = `<div class="avatar">m</div><div class="bubble">${escHtml(content)}</div>`;
    } else {
      wrap.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
    }
    chat.insertBefore(wrap, typing);
    scrollBottom();
    return wrap.querySelector('.bubble');
  }

  function appendSummaryCard(content) {
    const wrap = document.createElement('div');
    wrap.className = 'summary-card';
    wrap.innerHTML = `<h3>📝 ここまでのまとめ</h3><div class="content">${escHtml(content)}</div>`;
    chat.appendChild(wrap);
    scrollBottom();
  }

  async function streamToElement(bubble, messages, extraFlags = {}) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages,
        profile: profileText || undefined,
        fileContext: fileContext || undefined,
        ...extraFlags,
      }),
    });

    if (!res.ok) throw new Error();

    typing.classList.remove('show');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let text = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          if (json.content) { text += json.content; bubble.textContent = text; scrollBottom(); }
        } catch {}
      }
    }

    return text;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    userTurnCount++;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    typing.classList.add('show');
    document.getElementById('summaryPrompt').style.display = 'none';
    scrollBottom();

    try {
      const bubble = appendMessage('ai', '');
      const aiText = await streamToElement(bubble, history);
      history.push({ role: 'assistant', content: aiText });
      updateProgress();
    } catch {
      typing.classList.remove('show');
      appendMessage('ai', '少し時間をおいてから、もう一度話しかけてみてください。');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function requestSummary() {
    summarized = true;
    document.getElementById('summaryPrompt').style.display = 'none';
    sendBtn.disabled = true;

    typing.classList.add('show');
    scrollBottom();

    try {
      const summaryMessages = [...history, { role: 'user', content: 'ここまでの会話をまとめてください' }];
      const tempBubble = document.createElement('div');
      const text = await streamToElement(tempBubble, summaryMessages, { summarize: true });
      typing.classList.remove('show');
      appendSummaryCard(text);

      const fill = document.getElementById('progressFill');
      fill.style.width = '100%';
      document.getElementById('phaseLabel').textContent = '分析完了';
      document.getElementById('progressPercent').textContent = '100%';
    } catch {
      typing.classList.remove('show');
      appendMessage('ai', 'まとめの生成に失敗しました。もう一度お試しください。');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
