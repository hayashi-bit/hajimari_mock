<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miiiro – 壁打ちチャット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #C1694F;
      --navy: #0F3752;
      --border: #e8e0d8;
      --muted: #9a8a7a;
      --text: #1a1a1a;
      --bg: #f8f5f0;
      --sidebar-w: 260px;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
      z-index: 20;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--navy);
      text-decoration: none;
      cursor: pointer;
      user-select: none;
    }

    nav { display: flex; gap: 4px; margin-left: auto; }
    nav a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: #f0e8e0; color: var(--navy); }
    nav a.active { background: var(--primary); color: #fff; }

    /* 開発モード トースト */
    .dev-toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--navy);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: toastIn 0.25s ease-out;
    }
    .dev-toast a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
    }
    .dev-toast a:hover { text-decoration: underline; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ===== BODY LAYOUT ===== */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s ease, width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed { width: 0; }

    .sidebar-header {
      padding: 14px 14px 10px;
      flex-shrink: 0;
    }

    .new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: #b05a42; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding: 10px 14px 4px;
      flex-shrink: 0;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px 8px;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      min-width: 0;
    }
    .session-item:hover { background: #f8f5f0; }
    .session-item.active { background: #fff0ed; }

    .session-title {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .session-item.active .session-title { color: var(--primary); font-weight: 600; }

    .session-date {
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    .session-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .session-btn {
      width: 22px; height: 22px;
      border: none; background: none;
      cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--muted);
      transition: background 0.12s, color 0.12s;
      padding: 0;
    }
    .session-btn:hover { background: #f0e8e0; color: var(--navy); }
    .session-btn.starred { color: #f59e0b; opacity: 1; }
    .session-btn.delete:hover { background: #fee2e2; color: #b91c1c; }

    .empty-sessions {
      padding: 16px 14px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ===== SIDEBAR FOOTER (feedback) ===== */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding: 8px 10px;
    }

    .feedback-toggle-btn {
      width: 100%;
      padding: 7px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      text-align: left;
    }
    .feedback-toggle-btn:hover { background: #f8f5f0; border-color: var(--primary); color: var(--primary); }

    .fb-close-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
    }
    .fb-close-btn:hover { color: var(--navy); }

    .feedback-form-wrap {
      display: none;
      padding: 10px 4px 4px;
    }
    .feedback-form-wrap.open { display: block; }

    .fb-type-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .fb-type-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: #6b5a4a;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
    }
    .fb-type-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

    .fb-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      background: var(--bg);
      color: var(--text);
      outline: none;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .fb-textarea:focus { border-color: var(--primary); background: #fff; }

    .fb-submit-btn {
      width: 100%;
      padding: 7px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .fb-submit-btn:hover { background: #b05a42; }
    .fb-submit-btn:disabled { background: #e0d8d0; cursor: not-allowed; }

    .fb-status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
      min-height: 14px;
    }

    /* ===== MAIN CHAT AREA ===== */
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .banner {
      padding: 6px 16px;
      font-size: 12px;
      flex-shrink: 0;
      display: none;
      align-items: center;
      gap: 8px;
    }
    #profileBanner { background: #f0fdf4; border-bottom: 1px solid #bbf7d0; color: #166534; }
    #fileBanner { background: #eff6ff; border-bottom: 1px solid #bfdbfe; color: #1e40af; }
    #fileBanner button { margin-left: auto; background: none; border: none; color: #1e40af; cursor: pointer; font-size: 16px; }

    /* Progress */
    #progressBar {
      display: none;
      padding: 7px 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .progress-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .progress-track { height: 3px; background: #f0e8e0; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.5s ease; }

    /* Chat messages */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; gap: 10px; max-width: 82%; }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bubble {
      padding: 10px 14px;
      line-height: 1.75;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.ai .bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      color: var(--text);
    }
    .message.user .bubble {
      background: var(--primary);
      color: #fff;
      border-radius: 14px 4px 14px 14px;
    }

    /* Summary card */
    .summary-card {
      background: linear-gradient(135deg, #fff8f6, #fff);
      border: 1px solid #f0d8d0;
      border-radius: 12px;
      padding: 18px 20px;
      align-self: stretch;
    }
    .summary-card h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .summary-card .content { font-size: 14px; line-height: 1.85; white-space: pre-wrap; }

    /* Typing indicator */
    .typing { display: none; }
    .typing.show { display: flex; }

    .dots {
      display: flex; gap: 5px; align-items: center;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c8b8a8;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ===== SUMMARY ACCORDION BAR ===== */
    #summaryBar {
      display: none;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    #summaryBarToggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      text-align: left;
    }
    #summaryBarToggle:hover { background: #fff8f6; }
    #summaryBarToggle .bar-arrow { margin-left: auto; transition: transform 0.2s; font-size: 11px; }
    #summaryBarToggle.open .bar-arrow { transform: rotate(180deg); }

    #summaryBarContent {
      display: none;
      padding: 0 16px 12px;
    }
    #summaryBarContent.open { display: block; }

    #summaryBarContent p { font-size: 13px; color: var(--muted); margin-bottom: 8px; }

    .summary-btn {
      padding: 8px 20px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .summary-btn:hover { background: #0a2a3f; }

    /* Input area */
    .input-area {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: #fff;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      color: var(--muted);
      font-size: 15px;
    }
    .icon-btn:hover { background: #f0e8e0; border-color: var(--primary); color: var(--primary); }
    .icon-btn.active { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }

    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      color: var(--text);
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--primary); background: #fff; }
    textarea::placeholder { color: #c8b8a8; }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #b05a42; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #e0d8d0; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; fill: #fff; }

    #fileInput { display: none; }

    /* Toggle btn */
    .toggle-btn {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 5;
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: var(--muted);
      transition: background 0.15s;
    }
    .toggle-btn:hover { background: #f0e8e0; color: var(--navy); }

    @media (max-width: 640px) {
      .sidebar { position: absolute; top: 0; left: 0; bottom: 0; z-index: 30; box-shadow: 2px 0 12px rgba(0,0,0,0.1); }
      .sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-w); }
    }
  </style>
</head>
<body>

<header>
  <span class="logo" id="logoBtn">miiiro</span>
  <nav>
    <a href="/chat" class="active">✦ 壁打ち</a>
    <a href="/profile">👤 プロフィール</a>
  </nav>
</header>

<div class="body-wrap">

  <!-- ===== LEFT SIDEBAR ===== -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newChat()">
        ＋ 新しい会話
      </button>
    </div>

    <div id="starredSection" style="display:none;">
      <div class="sidebar-section-label">⭐ お気に入り</div>
      <div class="sidebar-list" id="starredList"></div>
    </div>

    <div class="sidebar-section-label">🕐 履歴</div>
    <div class="sidebar-list" id="historyList"></div>

    <!-- フィードバックフォーム -->
    <div class="sidebar-footer">
      <button class="feedback-toggle-btn" id="feedbackToggleBtn" onclick="toggleFeedbackForm()">
        💬 フィードバックを送る
      </button>
      <div class="feedback-form-wrap" id="feedbackFormWrap">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <span style="font-size:11px; color:var(--muted); font-weight:600;">フィードバック</span>
          <button class="fb-close-btn" onclick="closeFeedbackForm()" title="閉じる">✕</button>
        </div>
        <div class="fb-type-row">
          <button class="fb-type-btn selected" onclick="selectFbType(this, 'アイデア')">アイデア</button>
          <button class="fb-type-btn" onclick="selectFbType(this, '感想')">感想</button>
          <button class="fb-type-btn" onclick="selectFbType(this, '不具合')">不具合</button>
          <button class="fb-type-btn" onclick="selectFbType(this, '要望')">要望</button>
        </div>
        <textarea class="fb-textarea" id="fbContent" rows="3" placeholder="気になったこと、改善してほしいことなど..."></textarea>
        <button class="fb-submit-btn" id="fbSubmitBtn" onclick="submitFeedback()">送信する</button>
        <div class="fb-status" id="fbStatus"></div>
      </div>
    </div>
  </div>

  <!-- ===== MAIN CHAT ===== -->
  <div class="chat-wrap">
    <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()" title="サイドバー">☰</button>

    <div class="banner" id="profileBanner">
      <span id="profileBannerText"></span>
      <a href="/profile" style="color:#166534; font-weight:600; margin-left:4px;">変更</a>
    </div>

    <div class="banner" id="fileBanner">
      <span>📎</span>
      <span id="fileBannerText"></span>
      <button onclick="removeFile()" title="削除">×</button>
    </div>

    <div id="progressBar">
      <div class="progress-label">
        <span id="phaseLabel">🎯 フェーズ1：解決したいことを聞かせてください</span>
        <span id="progressPercent"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="chat-area" id="chat">
      <div class="message ai">
        <div class="avatar">✦</div>
        <div class="bubble" id="firstMessage">こんにちは 🌱 今日はどんなことを話しましょうか？</div>
      </div>
      <div class="message ai typing" id="typing">
        <div class="avatar">✦</div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <!-- まとめアコーディオンバー -->
    <div id="summaryBar">
      <button id="summaryBarToggle" onclick="toggleSummaryBar()">
        <span>💡 ある程度話せましたね。まとめてみますか？</span>
        <span class="bar-arrow">▼</span>
      </button>
      <div id="summaryBarContent">
        <p>会話から見えてきた強みや課題を整理します</p>
        <button class="summary-btn" onclick="requestSummary()">📝 ここまでをまとめる</button>
      </div>
    </div>

    <div class="input-area">
      <button class="icon-btn" id="attachBtn" title="資料を添付" onclick="document.getElementById('fileInput').click()">📎</button>
      <textarea id="input" placeholder="話しかけてみてください..." rows="1"></textarea>
      <button class="send-btn" id="send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".txt,.md,.csv,.pdf">

<script>
  // ===== CONSTANTS =====
  const PROFILE_KEY = 'hajimari_profile';
  const SESSIONS_KEY = 'hajimari_sessions';
  const USER_ID_KEY = 'hajimari_uid';
  const SUPA_URL = 'https://kwmulkworqsswmiqbabd.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3bXVsa3dvcnFzc3dtaXFiYWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQwMzcsImV4cCI6MjA5MjcyMDAzN30.yT9dssLbf6gjIzisahhRy8CJpzjxyQxpXdg_tI63imE';

  const PHASES = [
    { label: '🎯 フェーズ1：解決したいことを聞かせてください', until: 3 },
    { label: '💬 フェーズ2：今の状況を教えてください', until: 7 },
    { label: '🌟 フェーズ3：理想の姿を探っています', until: 11 },
    { label: '✨ 分析の仕上げ段階です', until: 999 },
  ];

  // ===== ANONYMOUS USER ID =====
  function getUserId() {
    let uid = localStorage.getItem(USER_ID_KEY);
    if (!uid) {
      uid = 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2);
      localStorage.setItem(USER_ID_KEY, uid);
    }
    return uid;
  }
  const userId = getUserId();

  // ===== SESSION STORAGE =====
  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
  }
  function saveSessions(sessions) {
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
  }
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // 過去セッションのサマリーを収集
  function buildPastContext() {
    const sessions = loadSessions();
    const summaries = sessions
      .filter(s => s.messages && s.messages.some(m => m.role === 'summary'))
      .slice(0, 5)
      .map(s => {
        const sum = s.messages.find(m => m.role === 'summary');
        return sum ? `【${new Date(s.createdAt).toLocaleDateString('ja-JP')}の会話まとめ】\n${sum.content}` : null;
      })
      .filter(Boolean);
    return summaries.length > 0 ? summaries.join('\n\n') : null;
  }

  // ===== CURRENT STATE =====
  let currentSessionId = null;
  let history = [];
  let userTurnCount = 0;
  let summarized = false;
  let fileContext = null;

  // ===== PROFILE =====
  function loadProfile() {
    try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); } catch { return {}; }
  }
  function buildProfileText(p) {
    const parts = [];
    if (p.name) parts.push(`名前：${p.name}`);
    if (p.jobType) parts.push(`職種：${p.jobType}`);
    if (p.organization) parts.push(`所属：${p.organization}`);
    if (p.workContent) parts.push(`業務内容：${p.workContent}`);
    if (p.teamStructure) parts.push(`チーム構成：${p.teamStructure}`);
    if (p.challenges) parts.push(`課題・悩み：${p.challenges}`);
    if (p.goals) parts.push(`目標：${p.goals}`);
    if (p.keywords) parts.push(`キーワード：${p.keywords}`);
    return parts.join('\n');
  }

  const profile = loadProfile();
  const profileText = buildProfileText(profile);

  let firstMsg = 'こんにちは 🌱 今日はどんなことを話しましょうか？';
  if (profileText.trim().length > 0) {
    const name = profile.name ? `${profile.name}さん、` : '';
    firstMsg = `${name}こんにちは ✨ ${profile.jobType ? profile.jobType + 'のお仕事をされているんですね。' : ''}今日はどんなことを話しましょうか？`;
    const banner = document.getElementById('profileBanner');
    banner.style.display = 'flex';
    document.getElementById('profileBannerText').textContent =
      `📋 ${[profile.jobType, profile.organization].filter(Boolean).join(' / ')} のプロフィール読み込み済み`;
  }
  document.getElementById('firstMessage').textContent = firstMsg;

  // ===== LOGO 5-CLICK DEV MODE =====
  let logoClicks = 0;
  let logoTimer = null;
  document.getElementById('logoBtn').addEventListener('click', () => {
    logoClicks++;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => { logoClicks = 0; }, 3000);
    if (logoClicks >= 5) {
      logoClicks = 0;
      showDevMode();
    }
  });

  function showDevMode() {
    const existing = document.querySelector('.dev-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'dev-toast';
    toast.innerHTML = '🔓 開発モード &nbsp;<a href="/">ダッシュボード</a> &nbsp;<a href="/docs">設計ドキュメント</a> &nbsp;<a href="/voices">フィードバック一覧</a>';
    document.body.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 8000);
  }

  // ===== SIDEBAR TOGGLE =====
  let sidebarOpen = true;
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
    document.getElementById('toggleBtn').textContent = sidebarOpen ? '✕' : '☰';
  }

  // ===== SUMMARY ACCORDION =====
  let summaryBarOpen = false;
  function toggleSummaryBar() {
    summaryBarOpen = !summaryBarOpen;
    const toggle = document.getElementById('summaryBarToggle');
    const content = document.getElementById('summaryBarContent');
    toggle.classList.toggle('open', summaryBarOpen);
    content.classList.toggle('open', summaryBarOpen);
  }

  // ===== FEEDBACK FORM =====
  let feedbackFormOpen = false;
  let selectedFbType = 'アイデア';

  function toggleFeedbackForm() {
    feedbackFormOpen = !feedbackFormOpen;
    document.getElementById('feedbackFormWrap').classList.toggle('open', feedbackFormOpen);
  }

  function closeFeedbackForm() {
    feedbackFormOpen = false;
    document.getElementById('feedbackFormWrap').classList.remove('open');
  }

  // フィードバックフォーム外クリックで閉じる
  document.addEventListener('click', (e) => {
    if (!feedbackFormOpen) return;
    const footer = document.querySelector('.sidebar-footer');
    if (footer && !footer.contains(e.target)) {
      closeFeedbackForm();
    }
  });

  function selectFbType(el, type) {
    selectedFbType = type;
    document.querySelectorAll('.fb-type-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function submitFeedback() {
    const content = document.getElementById('fbContent').value.trim();
    if (!content) return;

    const btn = document.getElementById('fbSubmitBtn');
    const status = document.getElementById('fbStatus');
    btn.disabled = true;
    status.textContent = '送信中...';

    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/feedback`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ type: selectedFbType, content }),
      });
      if (!res.ok) throw new Error();
      status.textContent = '✓ 送信しました！ありがとうございます';
      document.getElementById('fbContent').value = '';
      setTimeout(() => {
        status.textContent = '';
        feedbackFormOpen = false;
        document.getElementById('feedbackFormWrap').classList.remove('open');
      }, 2000);
    } catch {
      status.textContent = '送信に失敗しました。もう一度お試しください。';
    }
    btn.disabled = false;
  }

  // ===== RENDER SIDEBAR =====
  function renderSidebar() {
    const sessions = loadSessions();
    const starred = sessions.filter(s => s.starred);

    const starredSection = document.getElementById('starredSection');
    const starredList = document.getElementById('starredList');
    const historyList = document.getElementById('historyList');

    starredSection.style.display = starred.length > 0 ? 'block' : 'none';
    starredList.innerHTML = starred.map(s => sessionHTML(s)).join('');
    historyList.innerHTML = sessions.length > 0
      ? sessions.map(s => sessionHTML(s)).join('')
      : `<div class="empty-sessions">会話を始めると<br>ここに履歴が残ります</div>`;
  }

  function sessionHTML(s) {
    const isActive = s.id === currentSessionId;
    const date = new Date(s.createdAt).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
    return `
      <div class="session-item ${isActive ? 'active' : ''}" onclick="loadSession('${s.id}')">
        <div class="session-title">${escHtml(s.title)}</div>
        <div class="session-actions">
          <button class="session-btn ${s.starred ? 'starred' : ''}"
            onclick="event.stopPropagation(); toggleStar('${s.id}')"
            title="${s.starred ? 'お気に入り解除' : 'お気に入り'}">
            ${s.starred ? '⭐' : '☆'}
          </button>
          <button class="session-btn delete"
            onclick="event.stopPropagation(); deleteSession('${s.id}')"
            title="削除">✕</button>
        </div>
        <div class="session-date">${date}</div>
      </div>`;
  }

  // ===== SESSION ACTIONS =====
  function newChat() {
    currentSessionId = null;
    history = [{ role: 'assistant', content: firstMsg }];
    userTurnCount = 0;
    summarized = false;

    const chat = document.getElementById('chat');
    chat.innerHTML = `
      <div class="message ai">
        <div class="avatar">✦</div>
        <div class="bubble">${escHtml(firstMsg)}</div>
      </div>
      <div class="message ai typing" id="typing">
        <div class="avatar">✦</div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;

    document.getElementById('summaryBar').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('input').value = '';
    document.getElementById('input').style.height = 'auto';
    renderSidebar();
    document.getElementById('input').focus();
  }

  function loadSession(id) {
    const sessions = loadSessions();
    const session = sessions.find(s => s.id === id);
    if (!session) return;

    currentSessionId = id;
    history = session.messages;
    userTurnCount = session.messages.filter(m => m.role === 'user').length;
    summarized = session.summarized || false;

    const chat = document.getElementById('chat');
    chat.innerHTML = session.messages.map(m => {
      if (m.role === 'summary') {
        return `<div class="summary-card"><h3>📝 ここまでのまとめ</h3><div class="content">${escHtml(m.content)}</div></div>`;
      }
      const role = m.role === 'assistant' ? 'ai' : 'user';
      const bubble = `<div class="bubble">${escHtml(m.content)}</div>`;
      const avatar = `<div class="avatar">✦</div>`;
      return `<div class="message ${role}">${role === 'ai' ? avatar + bubble : bubble}</div>`;
    }).join('');

    chat.innerHTML += `
      <div class="message ai typing" id="typing">
        <div class="avatar">✦</div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;

    updateProgress();
    renderSidebar();
    chat.scrollTop = chat.scrollHeight;
  }

  function saveCurrentSession() {
    if (userTurnCount === 0) return;
    const sessions = loadSessions();
    const title = history.find(m => m.role === 'user')?.content?.slice(0, 30) || '無題の会話';
    const existing = sessions.findIndex(s => s.id === currentSessionId);

    if (existing >= 0) {
      sessions[existing].messages = history;
      sessions[existing].summarized = summarized;
    } else {
      currentSessionId = generateId();
      sessions.unshift({
        id: currentSessionId,
        title,
        createdAt: new Date().toISOString(),
        starred: false,
        messages: history,
        summarized,
      });
    }
    saveSessions(sessions);
    renderSidebar();
  }

  function toggleStar(id) {
    const sessions = loadSessions();
    const s = sessions.find(s => s.id === id);
    if (s) { s.starred = !s.starred; saveSessions(sessions); renderSidebar(); }
  }

  function deleteSession(id) {
    const sessions = loadSessions().filter(s => s.id !== id);
    saveSessions(sessions);
    if (currentSessionId === id) newChat();
    else renderSidebar();
  }

  // ===== PROGRESS =====
  function updateProgress() {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('phaseLabel');
    const pct = document.getElementById('progressPercent');

    if (userTurnCount === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';

    const phase = PHASES.find(p => userTurnCount <= p.until) || PHASES[PHASES.length - 1];
    label.textContent = phase.label;

    const progress = Math.min(Math.round((userTurnCount / 11) * 100), 95);
    fill.style.width = progress + '%';
    pct.textContent = progress + '%';

    if (userTurnCount >= 8 && !summarized) {
      document.getElementById('summaryBar').style.display = 'block';
    }
  }

  // ===== PDF =====
  async function extractPdfText(file) {
    if (typeof pdfjsLib === 'undefined') throw new Error();
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text.trim();
  }

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const banner = document.getElementById('fileBanner');
    document.getElementById('fileBannerText').textContent = `${file.name} を読み込み中...`;
    banner.style.display = 'flex';
    document.getElementById('attachBtn').classList.add('active');

    if (file.type === 'application/pdf') {
      try {
        const text = await extractPdfText(file);
        if (text.length > 10) {
          fileContext = `[PDFファイル: ${file.name}]\n${text.slice(0, 8000)}`;
          document.getElementById('fileBannerText').textContent = `📎 ${file.name}（${text.length}文字）読み込み完了`;
        } else {
          fileContext = `[PDFファイル: ${file.name}]\n※ スキャンPDFのためテキスト抽出できませんでした。`;
          document.getElementById('fileBannerText').textContent = `📎 ${file.name}（スキャンPDF・テキスト抽出不可）`;
        }
      } catch {
        fileContext = null;
        document.getElementById('fileBannerText').textContent = `📎 ${file.name}（読み取りエラー）`;
      }
    } else {
      try {
        const text = await file.text();
        fileContext = `[添付ファイル: ${file.name}]\n${text.slice(0, 8000)}`;
        document.getElementById('fileBannerText').textContent = `📎 ${file.name} 読み込み完了`;
      } catch {
        fileContext = null;
        document.getElementById('fileBannerText').textContent = `📎 ${file.name}（読み取りエラー）`;
      }
    }
    e.target.value = '';
  });

  function removeFile() {
    fileContext = null;
    document.getElementById('fileBanner').style.display = 'none';
    document.getElementById('attachBtn').classList.remove('active');
  }

  // ===== CHAT =====
  const chatEl = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

  function escHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, content = '') {
    const typing = document.getElementById('typing');
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    if (role === 'ai') {
      wrap.innerHTML = `<div class="avatar">✦</div><div class="bubble">${escHtml(content)}</div>`;
    } else {
      wrap.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
    }
    chatEl.insertBefore(wrap, typing);
    scrollBottom();
    return wrap.querySelector('.bubble');
  }

  function appendSummaryCard(content) {
    const wrap = document.createElement('div');
    wrap.className = 'summary-card';
    wrap.innerHTML = `<h3>📝 ここまでのまとめ</h3><div class="content">${escHtml(content)}</div>`;
    const typing = document.getElementById('typing');
    chatEl.insertBefore(wrap, typing);
    scrollBottom();
  }

  // streamToElement: タイピングを消してからバブルを生成（二重表示バグ修正）
  async function streamToElement(messages, extraFlags = {}) {
    const pastContext = buildPastContext();

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages,
        profile: profileText || undefined,
        fileContext: fileContext || undefined,
        pastContext: pastContext || undefined,
        currentTime: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', weekday: 'short' }),
        ...extraFlags,
      }),
    });

    if (!res.ok) throw new Error();

    const typing = document.getElementById('typing');
    typing.classList.remove('show');

    const bubble = appendMessage('ai', '');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let text = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          if (json.content) { text += json.content; bubble.textContent = text; scrollBottom(); }
        } catch {}
      }
    }

    return text;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    userTurnCount++;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = document.getElementById('typing');
    typing.classList.add('show');
    document.getElementById('summaryBar').style.display = 'none';
    scrollBottom();

    try {
      const aiText = await streamToElement(history.filter(m => m.role !== 'summary'));
      history.push({ role: 'assistant', content: aiText });
      saveCurrentSession();
      updateProgress();
    } catch {
      typing.classList.remove('show');
      appendMessage('ai', 'ちょっと不安定みたいです 🙏 少し時間をおいてからもう一度話しかけてみてください。');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function requestSummary() {
    summarized = true;
    document.getElementById('summaryBar').style.display = 'none';
    sendBtn.disabled = true;

    const typing = document.getElementById('typing');
    typing.classList.add('show');
    scrollBottom();

    try {
      const msgs = history.filter(m => m.role !== 'summary');
      const summaryMessages = [...msgs, { role: 'user', content: 'ここまでの会話をまとめてください' }];
      const tempBubble = document.createElement('div');
      // まとめ用は streamToElement を直接使えないので内部で処理
      const pastContext = buildPastContext();
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: summaryMessages,
          profile: profileText || undefined,
          pastContext: pastContext || undefined,
          currentTime: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', weekday: 'short' }),
          summarize: true,
        }),
      });
      if (!res.ok) throw new Error();
      typing.classList.remove('show');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let text = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            if (json.content) text += json.content;
          } catch {}
        }
      }

      appendSummaryCard(text);
      history.push({ role: 'summary', content: text });

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('phaseLabel').textContent = '✅ 分析完了';
      document.getElementById('progressPercent').textContent = '100%';
      saveCurrentSession();
    } catch {
      typing.classList.remove('show');
      appendMessage('ai', 'まとめの生成に失敗しました。もう一度お試しください。');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // ===== INIT =====
  history = [{ role: 'assistant', content: firstMsg }];
  renderSidebar();
</script>
