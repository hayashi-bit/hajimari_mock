<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hajimari – 壁打ちチャット</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #FFFBF5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #e8e0d8;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #FFFBF5;
      flex-shrink: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #0F3752;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    nav { display: flex; gap: 4px; margin-left: auto; }
    nav a {
      font-size: 13px;
      color: #9a8a7a;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: #f0e8e0; color: #0F3752; }
    nav a.active { background: #F87C62; color: #fff; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #0F3752;
      color: #FFFBF5;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bubble {
      padding: 12px 16px;
      line-height: 1.65;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: #fff;
      border: 1px solid #e8e0d8;
      border-radius: 4px 18px 18px 18px;
      color: #1a1a1a;
    }

    .message.user .bubble {
      background: #F87C62;
      color: #fff;
      border-radius: 18px 4px 18px 18px;
    }

    .typing { display: none; }
    .typing.show { display: flex; }

    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #e8e0d8;
      border-radius: 4px 18px 18px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c8b8a8;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid #e8e0d8;
      background: #FFFBF5;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      border: 1px solid #e8e0d8;
      border-radius: 22px;
      padding: 12px 18px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #F87C62; }
    textarea::placeholder { color: #c8b8a8; }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #F87C62;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #e96b50; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #e0d8d0; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">hajimari</a>
  <nav>
    <a href="/">ダッシュボード</a>
    <a href="/docs">ドキュメント</a>
    <a href="/chat" class="active">チャット</a>
    <a href="/profile">プロフィール</a>
  </nav>
</header>

<div id="profileBanner" style="display:none; padding: 8px 20px; background: #f0fdf4; border-bottom: 1px solid #bbf7d0; font-size: 12px; color: #166534; flex-shrink: 0;">
  <span id="profileBannerText"></span> · <a href="/profile" style="color:#166534; font-weight:600;">変更する</a>
</div>

<div class="chat-area" id="chat">
  <div class="message ai">
    <div class="avatar">h</div>
    <div class="bubble" id="firstMessage">こんにちは。今日はどんな一日でしたか？</div>
  </div>

  <div class="message ai typing" id="typing">
    <div class="avatar">h</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="返信する..." rows="1"></textarea>
  <button class="send-btn" id="send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const typing = document.getElementById('typing');

  const STORAGE_KEY = 'hajimari_profile';

  function loadProfile() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { return {}; }
  }

  function buildProfileText(p) {
    const parts = [];
    if (p.name) parts.push(`名前：${p.name}`);
    if (p.jobType) parts.push(`職種：${p.jobType}`);
    if (p.organization) parts.push(`所属：${p.organization}`);
    if (p.workContent) parts.push(`業務内容：${p.workContent}`);
    if (p.teamStructure) parts.push(`チーム構成：${p.teamStructure}`);
    if (p.challenges) parts.push(`課題・悩み：${p.challenges}`);
    if (p.goals) parts.push(`目標：${p.goals}`);
    if (p.keywords) parts.push(`キーワード：${p.keywords}`);
    return parts.join('\n');
  }

  const profile = loadProfile();
  const profileText = buildProfileText(profile);
  const hasProfile = profileText.trim().length > 0;

  let firstMessage = 'こんにちは。今日はどんな一日でしたか？';
  if (hasProfile) {
    const name = profile.name ? `${profile.name}さん、` : '';
    firstMessage = `${name}こんにちは。${profile.jobType || ''}の仕事をされているんですね。今日はどんなことを話しましょうか？`;
    document.getElementById('profileBanner').style.display = 'block';
    document.getElementById('profileBannerText').textContent =
      `📋 プロフィール読み込み済み（${[profile.jobType, profile.organization].filter(Boolean).join(' / ')}）`;
  }
  document.getElementById('firstMessage').textContent = firstMessage;

  const history = [
    { role: 'assistant', content: firstMessage }
  ];

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function escape(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function appendMessage(role, content = '') {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    if (role === 'ai') {
      wrap.innerHTML = `<div class="avatar">h</div><div class="bubble">${escape(content)}</div>`;
    } else {
      wrap.innerHTML = `<div class="bubble">${escape(content)}</div>`;
    }

    chat.insertBefore(wrap, typing);
    scrollBottom();
    return wrap.querySelector('.bubble');
  }

  async function send() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    typing.classList.add('show');
    scrollBottom();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, profile: profileText || undefined }),
      });

      if (!res.ok) throw new Error();

      typing.classList.remove('show');
      const bubble = appendMessage('ai', '');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let aiText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            if (json.content) {
              aiText += json.content;
              bubble.textContent = aiText;
              scrollBottom();
            }
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: aiText });

    } catch {
      typing.classList.remove('show');
      appendMessage('ai', '少し時間をおいてから、もう一度話しかけてみてください。');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
